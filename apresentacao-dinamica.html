    <style>
        :root {
            --color-bg: #111216;
            --color-bg-deep: #090a0d;
            --color-surface: #1a1d23;
            --color-text: #f7f4ee;
            --color-text-secondary: #ddd5c8;
            --color-text-muted: #b3aa9a;
            --color-accent-1: #c89b3c;
            --color-accent-2: #e6d3a5;
            --color-accent-3: #8f6a25;
            --color-glass-bg: rgba(255,255,255,0.06);
            --color-glass-border: rgba(255,255,255,0.10);
            --color-vignette: rgba(0,0,0,0.45);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            background: var(--color-bg);
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .deck {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.7s ease, transform 0.7s ease;
            pointer-events: none;
            overflow: hidden;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        .slide > .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1180px;
            padding: clamp(1.5rem, 4vw, 4rem);
        }

        .nav-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
            background: rgba(17,18,22,0.55);
            backdrop-filter: blur(10px);
            padding: 10px 22px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #e6d3a5;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.12);
        }

        .slide-dots {
            display: flex;
            gap: 8px;
        }

        .slide-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            cursor: pointer;
            transition: all .3s;
        }

        .slide-dots .dot.active {
            background: #c89b3c;
            transform: scale(1.3);
        }

        .slide-counter {
            font-size: .8rem;
            color: #ddd5c8;
            min-width: 48px;
            text-align: center;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
        }

        .gradient-mesh {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float-slow 12s ease-in-out infinite;
        }

        .blob:nth-child(2) {
            animation: float-drift 16s ease-in-out infinite;
        }

        .blob:nth-child(3) {
            animation: float-slow 18s ease-in-out infinite reverse;
        }

        .blob:nth-child(4) {
            animation: float-drift 20s ease-in-out infinite reverse;
        }

        @keyframes float-slow {
            0% { transform: translate(0,0) scale(1); }
            25% { transform: translate(50px,-35px) scale(1.08); }
            50% { transform: translate(-30px,25px) scale(.92); }
            75% { transform: translate(30px,20px) scale(1.05); }
            100% { transform: translate(0,0) scale(1); }
        }

        @keyframes float-drift {
            0% { transform: translate(0,0) scale(1) rotate(0deg); }
            33% { transform: translate(-45px,-55px) scale(1.12) rotate(3deg); }
            66% { transform: translate(40px,28px) scale(.9) rotate(-2deg); }
            100% { transform: translate(0,0) scale(1) rotate(0deg); }
        }

        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
            opacity: .025;
            mix-blend-mode: overlay;
        }

        .slide::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 48%, rgba(0,0,0,.45) 100%);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(200,155,60,.45), 0 0 40px rgba(200,155,60,.18);
        }

        .bar-track {
            width: 100%;
            height: 18px;
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #c89b3c, #e6d3a5);
            width: 0%;
        }

        .card-hover {
            transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
        }

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 45px rgba(0,0,0,.22);
            border-color: rgba(230,211,165,.26);
        }

        .logo-chip {
            background: rgba(255,255,255,.92);
            padding: 18px 28px;
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.18);
        }

        .section-label {
            letter-spacing: .22em;
            text-transform: uppercase;
            font-size: .78rem;
            color: #e6d3a5;
        }

        .mini-kpi {
            border: 1px solid rgba(255,255,255,.10);
            background: rgba(255,255,255,.05);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 18px;
        }

    "script": "let current = 1;\n  const total = document.querySelectorAll('.slide').length;\n  const dotsContainer = document.getElementById('dots');\n  const counter = document.getElementById('counter');\n  for (let i = 1; i <= total; i++) {\n    const dot = document.createElement('div');\n    dot.className = 'dot' + (i === 1 ? ' active' : '');\n    dot.onclick = () => goToSlide(i);\n    dotsContainer.appendChild(dot);\n  }\n  function goToSlide(n) {\n    const prev = document.querySelector('.slide.active');\n    const next = document.querySelector(`.slide[data-slide=\"${n}\"]`);\n    if (prev) prev.classList.remove('active');\n    if (next) { next.classList.add('active'); animateSlide(next); }\n    current = n; updateNav();\n  }\n  function changeSlide(dir) {\n    let next = current + dir;\n    if (next < 1) next = total;\n    if (next > total) next = 1;\n    goToSlide(next);\n  }\n  function updateNav() {\n    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i + 1 === current));\n    counter.textContent = `${current} / ${total}`;\n  }\n  function animateSlide(slide) {\n    slide.querySelectorAll('.reveal').forEach((el, i) => {\n      el.style.transition = 'none';\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(20px)';\n      el.offsetHeight;\n      const delay = i * 0.08;\n      el.style.transition = `opacity .42s ease ${delay}s, transform .42s ease ${delay}s`;\n      el.style.opacity = '1';\n      el.style.transform = 'translateY(0)';\n    });\n    slide.querySelectorAll('.bar-fill').forEach((bar, i) => {\n      bar.style.width = '0%';\n      bar.style.transition = `width .65s ease ${i * 0.1}s`;\n      bar.offsetHeight;\n      bar.style.width = (bar.dataset.width || '0') + '%';\n    });\n  }\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); changeSlide(1); }\n    if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }\n  });\n  let touchStartX = 0;\n  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });\n  document.addEventListener('touchend', e => {\n    const diff = touchStartX - e.changedTouches[0].clientX;\n    if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1);\n  });\n  animateSlide(document.querySelector('.slide.active'));"

        // Render slides from JSON
        function renderSlides() {
            const deck = document.getElementById('deck');
            const dotsContainer = document.getElementById('dots');
            const total = presentationData.slides.length;
            
            presentationData.slides.forEach((slide, index) => {
                const slideEl = document.createElement('div');
                slideEl.className = `slide ${slide.className}`;
                slideEl.setAttribute('data-slide', slide.id);
                slideEl.innerHTML = slide.html;
                deck.appendChild(slideEl);
            });

            // Create dots
            for (let i = 1; i <= total; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 1 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            }
        }

        // Navigation
        let current = 1;
        const total = presentationData.slides.length;
        const counter = document.getElementById('counter');

        function goToSlide(n) {
            const slides = document.querySelectorAll('.slide');
            const prevSlide = document.querySelector('.slide.active');
            
            if (prevSlide) prevSlide.classList.remove('active');
            
            const nextSlide = slides[n - 1];
            if (nextSlide) {
                nextSlide.classList.add('active');
                animateSlide(nextSlide);
            }
            
            current = n;
            updateNav();
        }

        function changeSlide(dir) {
            let next = current + dir;
            if (next < 1) next = total;
            if (next > total) next = 1;
            goToSlide(next);
        }

        function updateNav() {
            document.querySelectorAll('.dot').forEach((d, i) => {
                d.classList.toggle('active', i + 1 === current);
            });
            counter.textContent = `${current} / ${total}`;
        }

        function animateSlide(slide) {
            slide.querySelectorAll('.reveal').forEach((el, i) => {
                el.style.transition = 'none';
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.offsetHeight;
                const delay = i * 0.08;
                el.style.transition = `opacity .42s ease ${delay}s, transform .42s ease ${delay}s`;
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            });
            
            slide.querySelectorAll('.bar-fill').forEach((bar, i) => {
                bar.style.width = '0%';
                bar.style.transition = `width .65s ease ${i * 0.1}s`;
                bar.offsetHeight;
                bar.style.width = (bar.dataset.width || '0') + '%';
            });
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                changeSlide(1);
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                changeSlide(-1);
            }
        });

        // Touch navigation
        let touchStartX = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                changeSlide(diff > 0 ? 1 : -1);
            }
        });

        // Initialize
        renderSlides();
        animateSlide(document.querySelector('.slide.active'));
    </script>
